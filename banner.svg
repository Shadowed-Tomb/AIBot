<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13" />
      <stop offset="50%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#04060c" />
    </linearGradient>

    <!-- Dot Pattern -->
    <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#131e3a" />
    </pattern>
    
    <!-- Neon Cyan Glow -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Neon Pink Glow -->
    <filter id="pinkGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes glitch {
      0%, 100% { transform: translate(0); text-shadow: 2px 0 0 #ff007f, -2px 0 0 #00ffcc; }
      10% { transform: translate(-1px, -1px); text-shadow: 3px 0 0 #ff007f, -1px 0 0 #00ffcc; }
      20% { transform: translate(1px, 2px); text-shadow: -1px 0 0 #ff007f, 2px 0 0 #00ffcc; }
      30% { transform: translate(-2px, -1px); text-shadow: 2px 0 0 #ff007f, -3px 0 0 #00ffcc; }
      40% { transform: translate(2px, 1px); text-shadow: -2px 0 0 #ff007f, 1px 0 0 #00ffcc; }
      50% { transform: translate(-1px, 2px); text-shadow: 1px 0 0 #ff007f, -2px 0 0 #00ffcc; }
    }

    @keyframes scanline {
      0% { transform: translateY(-20px); }
      100% { transform: translateY(220px); }
    }

    @keyframes rotateCW {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes rotateCCW {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }

    @keyframes rain {
      0% { transform: translateY(-100px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.8; }
      100% { transform: translateY(200px); opacity: 0; }
    }

    @keyframes soundwave {
      0% { transform: scaleY(0.1); }
      100% { transform: scaleY(1); }
    }

    .neon-title {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      font-weight: 900;
      fill: #ffffff;
      animation: glitch 4s infinite linear alternate-reverse;
    }

    .sub-text {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      font-size: 11px;
      fill: #8b9bb4;
      letter-spacing: 5px;
    }

    .rain-text {
      font-family: monospace;
      font-size: 8px;
      fill: #00ff66;
      writing-mode: vertical-rl;
      text-orientation: upright;
      opacity: 0;
    }

    .glow-circle {
      stroke: #00ffcc;
      stroke-width: 0.8;
      fill: none;
      transform-origin: 700px 100px;
      animation: rotateCW 20s infinite linear;
    }

    .glow-circle-inner {
      stroke: #ff007f;
      stroke-width: 0.8;
      stroke-dasharray: 4, 8;
      fill: none;
      transform-origin: 700px 100px;
      animation: rotateCCW 10s infinite linear;
    }

    .sound-bar {
      fill: #ff007f;
      transform-origin: bottom;
      animation: soundwave 0.5s infinite alternate ease-in-out;
    }
  </style>

  <!-- Background Layer -->
  <rect width="800" height="200" rx="10" fill="url(#bgGrad)" stroke="#1a233d" stroke-width="2"/>
  <rect width="800" height="200" rx="10" fill="url(#dotGrid)"/>

  <!-- Tech Corner Borders -->
  <path d="M 20,40 L 20,20 L 40,20" stroke="#ff007f" stroke-width="2" fill="none"/>
  <path d="M 780,40 L 780,20 L 760,20" stroke="#ff007f" stroke-width="2" fill="none"/>
  <path d="M 20,160 L 20,180 L 40,180" stroke="#ff007f" stroke-width="2" fill="none"/>
  <path d="M 780,160 L 780,180 L 760,180" stroke="#ff007f" stroke-width="2" fill="none"/>

  <!-- Matrix Code Rain Columns (Left & Mid Background) -->
  <text x="35" y="0" class="rain-text" style="animation: rain 3s infinite linear; animation-delay: 0.2s;">101011001</text>
  <text x="75" y="0" class="rain-text" style="animation: rain 4s infinite linear; animation-delay: 1.5s;">0101101</text>
  <text x="115" y="0" class="rain-text" style="animation: rain 2.5s infinite linear; animation-delay: 0.8s;">1100101</text>
  <text x="155" y="0" class="rain-text" style="animation: rain 3.5s infinite linear; animation-delay: 2.2s;">001011</text>

  <!-- HUD/Aiming Target System in Right Background -->
  <circle cx="700" cy="100" r="60" class="glow-circle" />
  <circle cx="700" cy="100" r="45" class="glow-circle-inner" />
  <path d="M 680,100 L 720,100 M 700,80 L 700,120" stroke="#00ffcc" stroke-width="0.8" opacity="0.5"/>
  <rect x="650" y="50" width="100" height="100" stroke="#00ffcc" stroke-dasharray="10, 5" stroke-width="0.5" fill="none" opacity="0.3" style="animation: rotateCW 30s infinite linear; transform-origin: 700px 100px;"/>

  <!-- Visualizer Bars (Pulse Signal Indicator) -->
  <g transform="translate(180, 150)" style="filter: url(#pinkGlow);">
    <rect x="0" y="0" width="3" height="20" class="sound-bar" style="animation-delay: 0.1s;" />
    <rect x="6" y="0" width="3" height="30" class="sound-bar" style="animation-delay: 0.4s; fill: #00ffcc;" />
    <rect x="12" y="0" width="3" height="25" class="sound-bar" style="animation-delay: 0.2s;" />
    <rect x="18" y="0" width="3" height="35" class="sound-bar" style="animation-delay: 0.6s; fill: #00ffcc;" />
    <rect x="24" y="0" width="3" height="15" class="sound-bar" style="animation-delay: 0.3s;" />
    <rect x="30" y="0" width="3" height="28" class="sound-bar" style="animation-delay: 0.5s; fill: #00ffcc;" />
    <rect x="36" y="0" width="3" height="40" class="sound-bar" style="animation-delay: 0.1s;" />
    <rect x="42" y="0" width="3" height="22" class="sound-bar" style="animation-delay: 0.7s; fill: #00ffcc;" />
    <rect x="48" y="0" width="3" height="12" class="sound-bar" style="animation-delay: 0.3s;" />
  </g>

  <!-- Horizontal Scanning Line -->
  <line x1="0" y1="0" x2="800" y2="0" stroke="#00ffcc" stroke-width="1" opacity="0.35" style="animation: scanline 3.5s infinite linear;" />

  <!-- Center Title & Neon Glitch Text -->
  <text x="180" y="95" font-size="52" class="neon-title" filter="url(#cyanGlow)">XAI GROK BOT</text>
  
  <!-- Sub-details -->
  <text x="182" y="125" class="sub-text">TELEGRAM MULTIMEDIA SUITE</text>
  <text x="182" y="145" class="sub-text" fill="#ff007f" font-size="9" style="opacity: 0.85;">[ CHAT ] [ VISION ] [ IMAGINE ] [ ANIMATE ]</text>
  <text x="560" y="180" class="sub-text" font-size="10" fill="#00ffcc" style="opacity: 0.9;">T.ME/SHADOWEDTOMB</text>
</svg>
